
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>通話テスト</title>
  <style>
    :root {
      --bg: #fff; /* 背景を白 */
      --fg: #000; /* 文字を黒 */
      --btn-primary-bg: #2b6cf6;
      --btn-primary-fg: #fff;
      --btn-secondary-bg: #e0e0e0;
      --btn-secondary-fg: #000;
    }
    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      display: grid;
      place-items: center;
    }
    .container {
      width: min(520px, 92vw);
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 20px; margin: 0 0 12px; }
    p { font-size: 14px; color: #333; margin: 0 0 20px; }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 18px 20px;
      font-size: 18px;
      border-radius: 14px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      user-select: none;
    }
    .btn:active { filter: brightness(0.95); }

    .btn-primary {
      background: var(--btn-primary-bg);
      color: var(--btn-primary-fg);
      margin-bottom: 14px;
    }
    .btn-secondary {
      background: var(--btn-secondary-bg);
      color: var(--btn-secondary-fg);
    }

    .disclaimer {
      font-size: 12px;
      color: #666;
      margin-top: 12px;
      line-height: 1.6;
      text-align: left;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>着信テスト</h1>
    <p>ボタンを押すと通話アプリが起動し、試験番号 <strong>1111</strong> へ発信します。</p>
    <p>通話終了後、非通知番号での着信がございます。</p>

    <!-- 111へ発信ボタン -->
    <a class="btn btn-primary" href="tel:1111" role="button" aria-label="111へ電話をかける">1111に電話をかける</a>

    <!-- 次へボタン -->
    <a class="btn btn-secondary" href="mic.html" role="button" aria-label="次のチェックへ進む">次へ</a>

  </main>
</body>
</html>
