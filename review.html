
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ご利用ありがとうございました（口コミのお願い）</title>
  <style>
    :root {
      /* ベース（ライトテーマ） */
      --bg: #ffffff;      /* 背景：白 */
      --fg: #111111;      /* 文字：濃い黒 */
      --muted: #6b7280;   /* 補足テキスト（グレー600） */

      /* ボタン */
      --primary: #2b6cf6;    /* 口コミボタン（ブルー） */
      --primary-fg: #ffffff; /* 口コミボタンの文字色 */
      --btn-border: #e5e7eb; /* 薄グレーの枠線 */
      --btn-bg: #f3f4f6;     /* セカンダリ用の薄グレー背景（必要な場合） */
      --btn-fg: #111111;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      display: grid;
      place-items: center;
    }

    main {
      width: min(640px, 92vw);
      padding: 24px;
      text-align: center;
    }

    h1 { font-size: 22px; margin: 0 0 12px; }
    p  { font-size: 15px; color: #1f2937; margin: 0 0 18px; line-height: 1.8; } /* 本文はやや濃いグレー */
    .small { font-size: 12px; color: var(--muted); margin-top: 10px; }

    /* ボタン（aタグ用） */
    .btn {
      display: inline-block;
      width: 100%;
      padding: 16px 18px;
      font-size: 16px;
      border-radius: 14px;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      user-select: none;
      margin-top: 12px;

      /* デフォルト（プライマリ） */
      background: var(--primary);
      color: var(--primary-fg);
      border: 1px solid var(--primary);
      transition: filter 0.15s ease, transform 0.02s ease;
    }
    .btn:hover { filter: brightness(0.98); }
    .btn:active { transform: translateY(1px); }

    /* もしサブボタンが必要なら（例：InstagramやX） */
    .btn-secondary {
      background: var(--btn-bg);
      color: var(--btn-fg);
      border: 1px solid var(--btn-border);
    }
  </style>
</head>
<body>
  <main>
    <h1>ご利用ありがとうございました</h1>
    <p>
      この度は当店をご利用いただき、誠にありがとうございます。<br>
      よろしければ、今後のサービス向上のために<strong>簡単な口コミ</strong>にご協力をお願いします。<br>
      所要時間は<strong>30秒ほど</strong>、ひと言だけでも大歓迎です。
    </p>

    <!-- 口コミへ遷移するボタン（URLを店舗のものに差し替えてください） -->
    <a class="btn" href="https://g.page/r/CdR6B0kblKpvEBM/review" target="_blank" rel="noopener" aria-label="Googleで口コミを書く">
      口コミを書く（Google）
    </a>

    <!-- 必要なら複数ボタンもOK（Instagram・Xなど） -->
    <!--
    <a class="btn btn-secondary" href="https://www.instagram.com/xxxxx" target="_blank" rel="noopener">Instagramで投稿する</a>
    <a class="btn btn-secondary" href="https://x.com/compose/tweet?text=店名やハッシュタグ" target="_blank" rel="noopener">X（旧Twitter）で投稿する</a>
    -->

    <div class="small">
      無理なお願いはいたしません。可能な範囲でご協力いただけましたら幸いです。
    </div>
  </main>
</body>
</html>
