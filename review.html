<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>口コミのお願い</title>

  <style>
    :root {
      /* ベース（ライトテーマ） */
      --bg: #ffffff;
      --fg: #111111;
      --muted: #6b7280;

      /* ボタン */
      --primary: #2b6cf6;
      --primary-fg: #ffffff;
      --btn-border: #e5e7eb;
      --btn-bg: #f3f4f6;
      --btn-fg: #111111;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      display: grid;
      place-items: center;
    }

    main {
      width: min(640px, 92vw);
      padding: 24px;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 12px;
    }

    p {
      font-size: 15px;
      color: #1f2937;
      margin: 0 0 18px;
      line-height: 1.8;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 16px 18px;
      font-size: 16px;
      border-radius: 14px;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      user-select: none;
      margin-top: 12px;

      background: var(--primary);
      color: var(--primary-fg);
      border: 1px solid var(--primary);
      transition: filter 0.15s ease, transform 0.02s ease;
    }

    .btn:hover {
      filter: brightness(0.98);
    }

    .btn:active {
      transform: translateY(1px);
    }
  </style>
</head>

<body>
  <main>
    <h1>ご利用ありがとうございました</h1>

    <p id="thanksText">
      この度は当店をご利用いただき、誠にありがとうございます。<br>
      よろしければ、今後のサービス向上のために
      <strong>簡単な口コミ</strong>にご協力をお願いします。<br>
      所要時間は<strong>30秒ほど</strong>、ひと言だけでも大歓迎です。
    </p>

    <a
      id="reviewBtn"
      class="btn"
      href="#"
      target="_blank"
      rel="noopener"
      aria-label="Googleで口コミを書く"
    >
      口コミを書く（Google）
    </a>

    <p class="small">
      ※ 口コミ画面は別タブで開きます
    </p>
  </main>

  <script>
    /* ===== 店舗固定設定 ===== */
    const STORE_NAME = "スマホ修理工房イオンモール福岡店";  // ← 店舗名をここで固定
    const REVIEW_URL = "https://g.page/r/CdR6B0kblKpvEBM/review"; // ← 正式なGoogle口コミURL

    const thanksText = document.getElementById('thanksText');
    const reviewBtn = document.getElementById('reviewBtn');

    /* お礼文を店舗名入りに差し替え */
    thanksText.innerHTML =
      `この度は <strong>${STORE_NAME}</strong> のご利用ありがとうございました。<br>
       よろしければ、今後のサービス向上のために
       <strong>簡単な口コミ</strong>にご協力をお願いします。<br>
       所要時間は<strong>30秒ほど</strong>、ひと言だけでも大歓迎です。`;

    /* 口コミURLを設定 */
    reviewBtn.href = REVIEW_URL;
  </script>
</body>
</html>
