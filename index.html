<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>チェック種別選択</title>
<style>
body{
  margin:0; height:100%;
  display:grid; place-items:center;
  font-family: system-ui, "Noto Sans JP", sans-serif;
  background:#fff;
}
main{ width:min(480px,90%); text-align:center; }
h1{ font-size:22px; margin-bottom:20px; }
.btn{
  width:100%;
  padding:18px;
  font-size:18px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  margin-bottom:14px;
}
.repair-before{ background:#e5e7eb; }
.repair-after{ background:#2b6cf6; color:#fff; }
</style>
</head>
<body>
<main>
  <h1>チェック種別を選択</h1>
  <button class="btn repair-before" onclick="selectType('before')">
    修理前チェック
  </button>
  <button class="btn repair-after" onclick="selectType('after')">
    修理後チェック
  </button>
</main>

<script>
function selectType(type){
  localStorage.setItem('repairType', type);
  location.href = 'fptest.html';
}
</script>
</body>
</html>
