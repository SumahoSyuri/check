<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>マイクテスト</title>

  <style>
    :root{
      --bg:#ffffff; --fg:#111111; --muted:#6b7280;
      --primary:#2b6cf6; --primary-fg:#ffffff;
      --danger:#e74c3c;
      --card:#f9fafb; --border:#e5e7eb;
      --meter-bg:#ffffff;
      --wave:#0ea5a6;
      --rms:#2563eb;
      --peak:#f59e0b;
    }

    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
      display:grid;
      place-items:center;
    }

    main{
      width:min(560px,92vw);
      padding:24px;
      text-align:center;
    }

    h1{
      font-size:20px;
      margin:0 0 12px;
    }

    p{
      font-size:14px;
      color:var(--muted);
      margin:0 0 16px;
      text-align:left;
      line-height:1.6;
    }

    .row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      flex:1;
      width:100%;
      padding:16px 18px;
      font-size:18px;
      border-radius:14px;
      border:1px solid var(--border);
      cursor:pointer;
      background:#f3f4f6;
      color:var(--fg);
      user-select:none;
      transition:filter .15s ease, transform .02s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover{ filter:brightness(.98); }
    .btn:active{ transform:translateY(1px); }

    .btn-primary{
      background:var(--primary);
      color:var(--primary-fg);
      border-color:var(--primary);
    }

    .btn-danger{
      background:var(--danger);
      color:#fff;
      border-color:var(--danger);
    }

    .btn-next{
      background:#111827;
      color:#ffffff;
      border-color:#111827;
    }

    .meter-wrap{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      margin:14px 0 8px;
      text-align:left;
    }

    .meter-label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }

    canvas#meter{
      width:100%;
      height:72px;
      display:block;
      background:var(--meter-bg);
      border-radius:10px;
      border:1px solid var(--border);
    }

    .status{
      font-size:13px;
      color:var(--muted);
      margin-top:8px;
      min-height:1.6em;
      text-align:left;
    }
  </style>
</head>

<body>
  <main>
    <h1>マイクテスト</h1>

    <p>
      「スタート」を押すとマイク音声が
      <strong>1秒遅れ</strong>で返ってきます。<br>
      ※ 確認は任意です。行わなくても「次へ」に進めます。
    </p>

    <!-- スタート・ストップ -->
    <div class="row">
      <button id="startBtn" class="btn btn-primary">▶️ スタート</button>
      <button id="stopBtn" class="btn btn-danger" disabled>⏹️ ストップ</button>
    </div>

    <div class="meter-wrap">
      <div class="meter-label">入力波形（マイク入力チェック）</div>
      <canvas id="meter" width="900" height="180"></canvas>
    </div>

    <div id="status" class="status"></div>

    <!-- ✅ 次へ（常に押せる） -->
    <div class="row" style="margin-top:14px;">
      <button id="nextBtn" class="btn btn-next">➡️ 次へ</button>
    </div>
  </main>

  <script>
    /* ===== 固定設定 ===== */
    const DELAY_SEC = 1.0;
    const OUT_GAIN = 0.6;
    const FFT_SIZE = 2048;
    const VISUAL_GAIN = 3.0;
    const MAX_DELAY = 5.0;

    /* ===== UI ===== */
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const nextBtn = document.getElementById('nextBtn');
    const statusEl = document.getElementById('status');
    const meterCv = document.getElementById('meter');
    const ctx2d = meterCv.getContext('2d');

    /* ===== Audio ===== */
    let stream = null;
    let audioCtx = null;
    let sourceNode = null;
    let analyser = null;
    let delayNode = null;
    let gainNode = null;
    let rafId = null;
    let running = false;

    /* UI状態（次へは常にOK） */
    function setUI(on){
      running = on;
      startBtn.disabled = on;
      stopBtn.disabled = !on;
      statusEl.textContent = on
        ? `動作中：話した声が ${DELAY_SEC.toFixed(1)} 秒後に返ります`
        : '停止中：確認は任意です。「次へ」に進めます。';
    }

    function clearMeter(){
      ctx2d.fillStyle = '#ffffff';
      ctx2d.fillRect(0,0,meterCv.width,meterCv.height);
    }

    function startWaveform(){
      if (!analyser) return;
      analyser.fftSize = FFT_SIZE;
      const data = new Uint8Array(analyser.fftSize);
      const w = meterCv.width;
      const h = meterCv.height;
      const midY = h * 0.5;
      const ampScale = h * 0.3;

      function draw(){
        analyser.getByteTimeDomainData(data);

        ctx2d.fillStyle = '#ffffff';
        ctx2d.fillRect(0,0,w,h);

        ctx2d.strokeStyle = '#0ea5a6';
        ctx2d.lineWidth = 2;
        ctx2d.beginPath();

        const step = w / data.length;
        for(let i=0;i<data.length;i++){
          const raw = (data[i] - 128) / 128;
          const amp = Math.max(-1, Math.min(1, raw * VISUAL_GAIN));
          const x = i * step;
          const y = midY + amp * ampScale;
          if(i===0) ctx2d.moveTo(x,y);
          else ctx2d.lineTo(x,y);
        }
        ctx2d.stroke();

        rafId = requestAnimationFrame(draw);
      }

      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(draw);
    }

    function stopWaveform(){
      cancelAnimationFrame(rafId);
      rafId = null;
      clearMeter();
    }

    async function start(){
      if (running) return;

      try{
        stream = await navigator.mediaDevices.getUserMedia({
          audio:{
            echoCancellation:true,
            noiseSuppression:true,
            autoGainControl:true
          }
        });

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        await audioCtx.resume();

        sourceNode = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        delayNode = audioCtx.createDelay(MAX_DELAY);
        delayNode.delayTime.value = DELAY_SEC;
        gainNode = audioCtx.createGain();
        gainNode.gain.value = OUT_GAIN;

        sourceNode.connect(analyser);
        sourceNode.connect(delayNode);
        delayNode.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        setUI(true);
        startWaveform();
      }catch(err){
        statusEl.textContent = `開始できませんでした：${err.message}`;
        await stop(true);
      }
    }

    async function stop(silent=false){
      try{ gainNode?.disconnect(); }catch{}
      try{ delayNode?.disconnect(); }catch{}
      try{ analyser?.disconnect(); }catch{}
      try{ sourceNode?.disconnect(); }catch{}
      try{ stream?.getTracks()?.forEach(t=>t.stop()); }catch{}

      if(audioCtx){
        try{ await audioCtx.close(); }catch{}
      }

      stream = null;
      audioCtx = null;
      sourceNode = null;
      analyser = null;
      delayNode = null;
      gainNode = null;

      stopWaveform();
      if(!silent) setUI(false);
      else running = false;
    }

    /* ✅ 次へ：状態に関係なく進む（必ず停止してから） */
    async function goNext(){
      await stop(true);

      const repairType = localStorage.getItem('repairType');
      location.href =
        repairType === 'after'
          ? 'review.html'
          : 'pre_end.html';
    }

    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', ()=>stop(false));
    nextBtn.addEventListener('click', goNext);

    window.addEventListener('beforeunload', ()=>stop(true));

    clearMeter();
    setUI(false);
  </script>
</body>
</html>
